# AllyCore - Main Configuration
# Supports Hex Colors (&#FFFFFF) and Legacy Codes (&a, &b, etc.)

plugin:
  prefix: "&#6C63FF&lAlly&r&#A8A4FF &8»&r "
  debug: false
  update-check: true
  auto-save-interval: 300 # seconds

# Skin configuration for all Allies
skin:
  # Set via username lookup or custom texture
  # Mode: USERNAME or CUSTOM
  mode: USERNAME
  # If mode is USERNAME: put the Minecraft username whose skin to use
  username: "AllyKnight"
  # If mode is CUSTOM: provide texture value and signature from mineskin.org
  texture-value: ""
  texture-signature: ""
  # Display name shown above ally (can be overridden per-player)
  # Supports color codes
  default-display-name: "&#6C63FF✦ Ally ✦"

database:
  # SQLITE or MYSQL
  type: SQLITE
  sqlite:
    file: allycore_data.db
  mysql:
    host: localhost
    port: 3306
    database: allycore
    username: root
    password: ""
    pool-size: 10

messages:
  # Whether to use action bar for certain messages
  use-actionbar: true
  # Whether to play sounds on messages
  play-sounds: true
