# AllyCore - GUI Configuration
# Slot numbering: 0-53 for double chest (6 rows)
# Row 1: 0-8, Row 2: 9-17, Row 3: 18-26, Row 4: 27-35, Row 5: 36-44, Row 6: 45-53

# Main Ally Menu (opened by Shift + Right-Click on Ally)
main-menu:
  title: "&#6C63FF✦ Ally Menu ✦"
  rows: 6
  background-item:
    material: BLACK_STAINED_GLASS_PANE
    name: " "
  # Accent border item
  accent-item:
    material: PURPLE_STAINED_GLASS_PANE
    name: " "

  buttons:
    stat-tree:
      slot: 20
      material: EXPERIENCE_BOTTLE
      name: "&#A8A4FF✦ Stat Tree"
      lore:
        - "&#A3A3A3Upgrade your Ally's core stats."
        - ""
        - "&#6C63FFHealth &8· &#F97316Attack &8· &#3B82F6Defense"
        - "&#10B981Speed &8· &#A855F7Regeneration"
        - ""
        - "&#A8A4FFClick to open"
    armory:
      slot: 22
      material: IRON_SWORD
      name: "&#F97316⚔ Armory"
      lore:
        - "&#A3A3A3Upgrade your Ally's equipment."
        - ""
        - "&#A8A4FFArmor &8· Weapon"
        - ""
        - "&#A8A4FFClick to open"
    modes:
      slot: 24
      material: COMPASS
      name: "&#F59E0B⚙ Combat Mode"
      lore:
        - "&#A3A3A3Set how your Ally behaves in combat."
        - ""
        - "&#A8A4FFCurrent: {mode}"
        - ""
        - "&#A8A4FFClick to change"
    info:
      slot: 4
      material: PLAYER_HEAD
      name: "&#6C63FF{ally_name}"
      lore:
        - "&#A3A3A3Level &#FFFFFF{level} &#A3A3A3Ally"
        - ""
        - "&#EF4444❤ Health: &#FFFFFF{health}/{max_health}"
        - "&#F97316⚔ Attack: &#FFFFFF{attack}"
        - "&#3B82F6🛡 Defense: &#FFFFFF{defense}"
        - "&#10B981⚡ Speed: &#FFFFFF{speed}"
        - ""
        - "&#6C63FF✦ XP: &#FFFFFF{xp}/{xp_needed}"
        - "&#A8A4FFMementos: &#6C63FF{mementos}"
    rename:
      slot: 31
      material: NAME_TAG
      name: "&#10B981✏ Rename Ally"
      lore:
        - "&#A3A3A3Give your Ally a custom name."
        - ""
        - "&#A8A4FFCurrent: &#FFFFFF{ally_name}"
        - ""
        - "&#A8A4FFClick to rename"
    summon-dismiss:
      slot: 33
      material: ENDER_PEARL
      name: "&#A8A4FF⊕ Summon / Dismiss"
      lore:
        - "&#A3A3A3Toggle your Ally's presence."
        - ""
        - "&#A8A4FFStatus: &#FFFFFF{status}"
        - ""
        - "&#A8A4FFClick to toggle"
    follow-stay:
      slot: 29
      material: FEATHER
      name: "&#A8A4FF➤ Follow / Stay"
      lore:
        - "&#A3A3A3Toggle follow mode."
        - ""
        - "&#A8A4FFStatus: &#FFFFFF{follow_status}"
        - ""
        - "&#A8A4FFClick to toggle"
    revive:
      slot: 49
      material: TOTEM_OF_UNDYING
      name: "&#EF4444💀 Revive Ally"
      lore:
        - "&#A3A3A3Revive your fallen Ally."
        - ""
        - "&#A3A3A3Cost: &#FFFFFF${vault_cost} &#A3A3A3+ &#6C63FF{mementos_cost} Mementos"
        - ""
        - "&#A8A4FFOnly available when Ally is dead."
    close:
      slot: 53
      material: BARRIER
      name: "&#EF4444✗ Close"
      lore:
        - "&#A3A3A3Close this menu."

# Stat Tree Menu
stat-tree-menu:
  title: "&#A8A4FF✦ Stat Tree ✦"
  rows: 6
  background-item:
    material: BLACK_STAINED_GLASS_PANE
    name: " "
  accent-item:
    material: BLUE_STAINED_GLASS_PANE
    name: " "
  back-button:
    slot: 49
    material: ARROW
    name: "&#A3A3A3← Back"
  stat-slots:
    health: 20
    attack: 22
    defense: 24
    speed: 30
    regeneration: 32
  # Upgrade confirm button (appears in upgrade menu)
  confirm-slot: 31
  cancel-slot: 29

# Armory Menu
armory-menu:
  title: "&#F97316⚔ Armory ✦"
  rows: 6
  background-item:
    material: BLACK_STAINED_GLASS_PANE
    name: " "
  accent-item:
    material: ORANGE_STAINED_GLASS_PANE
    name: " "
  back-button:
    slot: 49
    material: ARROW
    name: "&#A3A3A3← Back"
  armor-slot: 20
  weapon-slot: 24
  current-armor-display-slot: 11
  current-weapon-display-slot: 15

# Mode Selection Menu
mode-menu:
  title: "&#F59E0B⚙ Combat Mode ✦"
  rows: 3
  background-item:
    material: BLACK_STAINED_GLASS_PANE
    name: " "
  accent-item:
    material: YELLOW_STAINED_GLASS_PANE
    name: " "
  back-button:
    slot: 26
    material: ARROW
    name: "&#A3A3A3← Back"
  slots:
    DEFENSIVE: 10
    AGGRESSIVE: 12
    NEUTRAL: 14
    ALLROUND: 16

# Rename Anvil GUI hint
rename-prompt:
  title: "&#10B981Enter Ally Name"
